---
- name: "Crear directorios de configuración para el Perímetro"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/traefik
    - /opt/traefik/rules
    - /opt/coraza/config
    - /opt/soanar/edge  # <-- Directorio nuevo para el docker-compose.yml
  become: true

- name: "Garantizar que existe la red apps_network"
  community.docker.docker_network:
    name: apps_network
    state: present
  become: true

- name: "Instalar y configurar Fail2Ban (Protección SSH)"
  block:
    - name: "Instalar Fail2Ban"
      ansible.builtin.apt:
        name: fail2ban
        state: present

    - name: "Configurar jail local para SSH"
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
          bantime = 1h
      notify: "Reiniciar Fail2ban"
  become: true

# --- AQUÍ EMPIEZA EL CAMBIO A V2 ---

- name: "Generar archivo docker-compose.yml desde Template"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/soanar/edge/docker-compose.yml
    mode: '0644'
  become: true

- name: "Desplegar Traefik + Coraza WAF + CrowdSec (V2)"
  community.docker.docker_compose_v2:
    project_src: "/opt/soanar/edge"
    project_name: edge_node
    state: present
  become: true

# --- AQUÍ SIGUEN TUS TAREAS DE CONFIGURACIÓN ---

- name: "Configurar Reglas del WAF (OWASP Core Rule Set)"
  ansible.builtin.template:
    src: coraza.conf.j2
    dest: /opt/coraza/config/default.conf
  become: true