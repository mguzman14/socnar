---
- name: "Asegurar que el directorio de datos para n8n existe"
  tags: n8n
  ansible.builtin.file:
    path: /opt/n8n
    state: directory
    mode: '0777'
  become: true

- name: "Desplegar n8n (Cerebro de Automatización)"
  tags: n8n
  community.docker.docker_container:
    name: n8n
    image: n8nio/n8n:latest
    restart_policy: always
    ports:
      - "5678:5678"
    volumes:
      - /opt/n8n:/home/node/.n8n
    networks:
      - name: network_all
    env:
      N8N_LOG_LEVEL: info
      GENERIC_TIMEZONE: "Europe/Madrid"
      N8N_SECURE_COOKIE: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
      N8N_PROXY_HOPS: "1" # traefik

    labels:
      traefik.enable: "true"
  become: true