---

- name: "Crear directorio para llaves de paquetes"
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: "Añadir llave GPG oficial de Docker"
  get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: "Añadir repositorio de Docker"
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: "Instalar paquetes de Docker"
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    
- name: "Instalar librería compatible con 'definition'"
  ansible.builtin.pip:
    name: 
      - docker
      # - docker-compose
    state: present
    executable: pip3
    extra_args: "--break-system-packages"

- name: "Asegurar que Docker está corriendo"
  service:
    name: docker
    state: started
    enabled: yes

- name: "Configurar límites de logs globales para Docker"
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "50m",
          "max-file": "3"
        }
      }


- name: "DOCKER | Añadir usuario al grupo docker"
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

- name: "DOCKER | Resetear conexión para aplicar cambios de grupo"
  ansible.builtin.meta: reset_connection