---
- name: "Actualizar caché de apt"
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: "Instalar dependencias base"
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-pip
      - python3-docker
      - python3-setuptools
    state: present

- name: "Instalar Docker (Engine y Compose)"
  block:
    - name: "Crear directorio para llaves de paquetes"
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: "Añadir llave GPG oficial de Docker"
      get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: "Añadir repositorio de Docker"
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: "Instalar paquetes de Docker"
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        
    - name: "Instalar librería compatible con 'definition'"
      ansible.builtin.pip:
        name: 
          - docker
          # - docker-compose
        state: present
        executable: pip3
        extra_args: "--break-system-packages"

- name: "Asegurar que Docker está corriendo"
  service:
    name: docker
    state: started
    enabled: yes

- name: "Configurar límites de logs globales para Docker"
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "50m",
          "max-file": "3"
        }
      }
  notify: "Reiniciar Docker"

- name: Crear directorio para la configuración de Portainer
  ansible.builtin.file:
    path: /opt/portainer
    state: directory
    mode: '0755'

- name: Copiar el template del Docker Compose de Portainer
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: /opt/portainer/docker-compose.yml
    mode: '0644'

- name: Levantar el contenedor de Portainer usando el Compose
  community.docker.docker_compose_v2:
    project_src: /opt/portainer
    state: present
    pull: always
    remove_orphans: yes

- name: "Instalar Tailscale (Tu VPN de Ciberseguridad)"
  shell: "curl -fsSL https://tailscale.com/install.sh | sh"
  args:
    creates: /usr/bin/tailscale

- name: "Habilitar el servicio de Tailscale"
  service:
    name: tailscaled
    state: started
    enabled: yes
  tags: vpn

- name: "Autenticar y levantar el túnel de Tailscale"
  shell: "tailscale up --authkey={{ tailscale_key }} --accept-dns=true"
  register: tailscale_up
  changed_when: "'is already running' not in tailscale_up.stderr"
  tags: vpn
