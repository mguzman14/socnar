---
- name: "Asegurar que la red de aplicaciones existe"
  community.docker.docker_network:
    name: network_all
    state: present

- name: "Desplegar OWASP Juice-Shop (Vulnerable App)"
  community.docker.docker_container:
    name: juice-shop
    image: bkimminich/juice-shop:latest
    networks:
      - name: network_all
    restart_policy: always
    labels:
      # 1. Habilitar Traefik para este contenedor
      traefik.enable: "true"
      
      # 2. Definir el Host (usa la variable de tu host_vars/udg.yml)
      traefik.http.routers.juice.rule: "Host(`{{ domain_name }}`)"
      traefik.http.routers.juice.entrypoints: "web"
      
      # 3. CONEXIÓN CRÍTICA: Aplicar el middleware del WAF Coraza
      # Este middleware se define en el rol 'edge_node'
      traefik.http.routers.juice.middlewares: "coraza-waf@docker"
      
      # 4. Puerto interno de Juice-Shop
      traefik.http.services.juice.loadbalancer.server.port: "3000"

- name: "Verificar estado del contenedor"
  community.docker.docker_container_info:
    name: juice-shop
  register: result

- name: "Mostrar URL de acceso"
  debug:
    msg: "La Juice-Shop debería estar disponible en http://{{ domain_name }}"