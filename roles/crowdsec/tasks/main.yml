- name: "1. Limpiar restos para evitar el error de carpeta vs archivo"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/var/log/crowdsec.log"
    - "/opt/crowdsec/config/acquis.yaml"

- name: "2. Asegurar directorios de configuración"
  become: true
  ansible.builtin.file:
    path: "/opt/crowdsec/config"
    state: directory
    mode: '0755'

- name: "3. Crear el archivo de log (COMO ARCHIVO REAL)"
  become: true
  ansible.builtin.file:
    path: /var/log/crowdsec.log
    state: touch
    owner: root
    group: root
    mode: '0644'

- name: "4. Generar configuración desde templates"
  become: true
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0644'
  loop:
    - { src: 'acquis.yml.j2', dest: '/opt/crowdsec/config/acquis.yaml' }
    - { src: 'profiles.yml.j2', dest: '/opt/crowdsec/config/profiles.yaml' }

- name: "Generar archivo docker-compose.yml desde Template"
  template:
    src: dcompose-crowdsec.yml.j2
    dest: /opt/crowdsec/docker-compose.yml


- name: "Desplegar Crowdsec"
  community.docker.docker_compose_v2:
    project_src: "/opt/crowdsec"
    state: present
  become: true


- name: Eliminar bouncer de Traefik si ya existe
  ansible.builtin.shell: docker exec crowdsec cscli bouncers list -o raw | cut -d',' -f1 | grep -v "name" | xargs -I {} docker exec crowdsec cscli bouncers delete {}
  failed_when: false 
  changed_when: false 

- name: Generar API Key para el bouncer de Traefik
  ansible.builtin.shell: docker exec crowdsec cscli bouncers add TraefikBouncer -o raw
  register: bouncer_output


- name: Guardar la key como una "fact" global
  ansible.builtin.set_fact:
    crowdsec_api_key: "{{ bouncer_output.stdout | trim if bouncer_output.stdout is defined else crowdsec_api_key }}"