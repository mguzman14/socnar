
- name: "Asegurar que el directorio de configuración existe"
  file:
    path: "/opt/crowdsec"
    state: directory
    mode: '0755'
    owner: root  # O tu usuario si prefieres
    group: root

- name: "Limpiar TODO para evitar conflictos de Docker"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/opt/crowdsec/config/acquis.yaml"  # Borra si es archivo O carpeta
    - "/var/log/crowdsec.log"           # Borra si es archivo O carpeta

- name: "Crear estructura de directorios limpia"
  ansible.builtin.file:
    path: "/opt/crowdsec/config"
    state: directory
    mode: '0755'

- name: "Crear archivo acquis.yaml (ARCHIVO REAL)"
  ansible.builtin.template:
    src: acquis.yml.j2
    dest: "/opt/crowdsec/config/acquis.yaml"
    mode: '0644'

- name: "Crear archivo de log (ARCHIVO REAL)"
  ansible.builtin.file:
    path: "/var/log/crowdsec.log"
    state: touch
    mode: '0666'




- name: "Generar archivo docker-compose.yml desde Template"
  template:
    src: dcompose-crowdsec.yml.j2
    dest: /opt/crowdsec/docker-compose.yml


- name: "Desplegar Crowdsec"
  community.docker.docker_compose_v2:
    project_src: "/opt/crowdsec"
    state: present
  become: true


- name: Eliminar bouncer de Traefik si ya existe
  ansible.builtin.shell: docker exec crowdsec cscli bouncers delete TraefikBouncer
  failed_when: false # No importa si falla porque no existe
  changed_when: false 

- name: Generar API Key para el bouncer de Traefik
  ansible.builtin.shell: docker exec crowdsec cscli bouncers add TraefikBouncer -o raw
  register: bouncer_output
  # Esta vez no se saltará, así que siempre tendrá stdout

- name: Guardar la key como una "fact" global
  ansible.builtin.set_fact:
    crowdsec_api_key: "{{ bouncer_output.stdout | trim }}"