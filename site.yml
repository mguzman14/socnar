- name: "Infraestructura Base"
  hosts: all
  become: true
  gather_facts: yes
  roles:
    - role: common
      tags: [ 'ssh', 'docker', 'vpn' ]

- name: "Fail2ban"
  hosts: all
  become: true
  gather_facts: no
  roles:
    - role: fail2ban
      tags: [ 'fail2ban' ]
  

- name: "MISP"
  hosts: debian-whale
  become: yes
  gather_facts: no
  vars:
    # --- VARIABLES GLOBALES PARA MISP ---
    misp_base_dir: "/opt/misp"
    misp_https_port: "8448"
    misp_http_port: "8088"
    misp_base_url: "https://{{ ansible_dns }}:{{ misp_https_port }}"
    
  roles:
    - role: misp
      tags: [ 'misp' ]
  
