- name: "Infraestructura Base"
  hosts: all
  become: true
  roles:
    - role: common
      tags: [ 'common', 'ssh', 'docker', 'vpn', 'config', 'deploy', 'portainer' ]

- name: "Fail2ban"
  hosts: all
  become: true
  roles:
    - role: fail2ban
      tags: [ 'fail2ban' ]
  

- name: "MISP"
  hosts: debian-whale
  become: yes
  roles:
    - role: misp
      tags: [ 'misp', 'config', 'deploy', 'check' ]
  
- name: "Wazuh manager y la tropa"
  hosts: wazuh-manager
  become: yes
  roles:
    - role: wazuh
      tags: [ 'wazuh-manager' ]

- name: "Wazuh Agent"
  hosts: wazuh_agents
  become: yes
  roles:
    - role: wazuh
      tags: [ 'wazuh-agent' ]

- name: "Audit"
  hosts: all
  become: yes
  roles:
    - role: audit
      tags: [ 'audit' ]